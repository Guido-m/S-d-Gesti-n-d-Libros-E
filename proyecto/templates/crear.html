<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Registrar Libro</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --primary: #4f46e5;
                --primary-hover: #4338ca;
                --bg-color: #f3f4f6;
                --text-main: #1f2937;
                --text-muted: #6b7280;
                --border-color: #d1d5db;
            }
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            body {
                font-family: "Inter", sans-serif;
                background-color: var(--bg-color);
                color: var(--text-main);
                display: flex;
                justify-content: center;
                padding: 40px 20px;
            }
            .container {
                width: 100%;
                max-width: 500px;
                background: white;
                padding: 30px;
                border-radius: 12px;
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            }
            h2 {
                margin-bottom: 20px;
                color: #111827;
                border-bottom: 2px solid #e5e7eb;
                padding-bottom: 10px;
            }
            .form-group {
                margin-bottom: 15px;
            }
            label {
                display: block;
                font-weight: 500;
                margin-bottom: 5px;
                color: var(--text-main);
                font-size: 0.875rem;
            }
            input {
                width: 100%;
                padding: 10px;
                border: 1px solid var(--border-color);
                border-radius: 6px;
                font-family: "Inter", sans-serif;
                transition: border-color 0.2s;
            }
            input:focus {
                outline: none;
                border-color: var(--primary);
                box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
            }
            .btn-submit {
                width: 100%;
                padding: 12px;
                background-color: var(--primary);
                color: white;
                border: none;
                border-radius: 6px;
                font-weight: 600;
                font-size: 1rem;
                cursor: pointer;
                transition: background-color 0.2s;
                margin-top: 10px;
            }
            .btn-submit:hover {
                background-color: var(--primary-hover);
            }
            .btn-back {
                display: block;
                text-align: center;
                margin-top: 20px;
                color: var(--text-muted);
                text-decoration: none;
                font-size: 0.875rem;
            }
            .btn-back:hover {
                color: var(--primary);
            }
        </style>
    </head>
    <body>
        <div class="container">
            <h2>📚 Registrar Nuevo Libro</h2>
            <form action="/guardar" method="POST">
                <div class="form-group">
                    <label>Título:</label>
                    <input
                        type="text"
                        name="titulo"
                        required
                        placeholder="Ej: Hábitos Atómicos"
                    />
                </div>
                <div class="form-group">
                    <label>Autor:</label>
                    <input
                        type="text"
                        name="autor"
                        required
                        placeholder="Ej: James Clear"
                    />
                </div>
                <div class="form-group">
                    <label>Género:</label>
                    <input
                        type="text"
                        name="genero"
                        placeholder="Ej: Productividad"
                    />
                </div>
                <div class="form-group">
                    <label>Año de Publicación:</label>
                    <input type="number" name="anio" placeholder="Ej: 2018" />
                </div>
                <div class="form-group">
                    <label>Formato:</label>
                    <input
                        type="text"
                        name="formato"
                        placeholder="Ej: PDF, EPUB"
                    />
                </div>
                <button type="submit" class="btn-submit">Guardar Libro</button>
            </form>
            <a href="/" class="btn-back">⬅️ Cancelar y volver al inicio</a>
        </div>
    </body>
</html>
